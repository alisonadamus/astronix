<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="uk">
<html th:replace="layout :: layout(~{::title}, ~{::#main-content})">
<head>
    <title>Реєстрація - Astronix</title>
</head>
<body>
<div id="main-content">
    <div class="auth-container">
        <h2>Реєстрація в Astronix</h2>

        <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

        <form method="post" th:action="@{/auth/register}" th:object="${registerDto}">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <label>Email</label>
            <input type="email" th:field="*{email}" placeholder="astronaut@astronix.com"/>
            <span class="error" th:errors="*{email}"></span>

            <label>Логін</label>
            <input type="text" th:field="*{login}" placeholder="astronaut"/>
            <span class="error" th:errors="*{login}"></span>

            <label>Пароль</label>
            <input type="password" th:field="*{password}" placeholder="••••••••"/>
            <span class="error" th:errors="*{password}"></span>

            <label>Підтвердити пароль</label>
            <input type="password" th:field="*{confirmPassword}" placeholder="••••••••"/>
            <span class="error" th:errors="*{confirmPassword}"></span>

            <button type="submit">Зареєструватись</button>
        </form>

        <p>Вже є аккаунт? <a th:href="@{/auth/login}">Увійти на борт</a></p>
    </div>
</div>
</body>
</html>
