<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="uk">
<html th:replace="~{layout :: layout(~{::title}, ~{::#main-content})}">
<head>
    <title>Матеріали - Astronix</title>
</head>
<body>
<div id="main-content" style="width: 100%; padding: 0;">
    <nav class="navbar" th:replace="~{locations :: .navbar}"></nav>

    <div class="admin-layout">
        <aside class="sidebar" th:replace="~{admin/locations :: aside}"></aside>

        <main class="admin-content">
            <h2 th:text="${material.id == null ? 'Реєстрація нової матерії' : 'Коригування даних'}"></h2>

            <div class="auth-container" style="max-width: 900px; margin: 0; text-align: left;">
                <form th:action="@{/admin/materials/save}" th:object="${material}" method="post">
                    <input type="hidden" th:field="*{id}">

                    <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 20px; margin-bottom: 20px;">
                        <div>
                            <label>Назва об'єкту</label>
                            <input type="text" th:field="*{name}" required placeholder="Напр: Темна матерія">
                        </div>
                        <div>
                            <label>Час вивчення (хв)</label>
                            <input type="number" th:field="*{estimatedTime}" placeholder="0">
                        </div>
                    </div>

                    <div style="margin-bottom: 20px;">
                        <label>Локація знаходження</label>
                        <select th:field="*{location}">
                            <option th:value="null">-- Оберіть систему --</option>
                            <option th:each="loc : ${locations}" th:value="${loc.id}" th:text="${loc.name}"></option>
                        </select>
                    </div>

                    <div style="margin-bottom: 25px;">
                        <label style="display: block; margin-bottom: 10px; color: #4facfe; font-weight: 600;">
                            Категорії матеріалу
                        </label>
                        <div class="checkbox-group">
                            <label th:each="cat : ${categories}" class="checkbox-item">
                                <input type="checkbox"
                                       th:field="*{categories}"
                                       th:value="${cat.id}">
                                <span th:text="${cat.name}"></span>
                            </label>
                        </div>
                        <small style="color: #718096; margin-top: 8px; display: block;">
                            Оберіть одну або декілька категорій, до яких належить цей ресурс.
                        </small>
                    </div>


                    <div class="material-content" style="margin-bottom: 20px; display: block;">
                        <label style="color: #4facfe; font-weight: 600;">Контент</label>
                        <textarea th:field="*{content}" id="markdown-editor"></textarea>
                    </div>


                    <div style="display: flex; gap: 15px;">
                        <button type="submit">Зберегти зміни</button>
                        <a th:href="@{/admin/materials}"
                           style="line-height: 50px; color: #a0aec0; text-decoration: none;">Скасувати</a>
                    </div>
                </form>
            </div>
        </main>

        <link rel="stylesheet" href="https://unpkg.com/easymde/dist/easymde.min.css">
        <script src="https://unpkg.com/easymde/dist/easymde.min.js"></script>

        <script>
            document.addEventListener('DOMContentLoaded', function () {
                const markdownField = document.getElementById('markdown-editor');

                if (markdownField) {
                    const easyMDE = new EasyMDE({
                        element: markdownField,
                        spellChecker: false,
                        autosave: {
                            enabled: false
                        },
                        status: ["lines", "words"],
                        forceSync: true,
                        minHeight: "300px",
                        toolbar: [
                            "bold", "italic", "heading", "|",
                            "quote", "unordered-list", "ordered-list", "|",
                            "link", "image", "table", "|",
                            "preview", "side-by-side", "fullscreen", "|",
                            "guide"
                        ]
                    });
                }
            });
        </script>

        <style>
            .editor-toolbar, .CodeMirror, .editor-preview-side {
                width: 100% !important;
                box-sizing: border-box;
            }

            .editor-toolbar {
                display: flex !important;
                flex-wrap: wrap;
                border-top-left-radius: 8px;
                border-top-right-radius: 8px;
                padding: 6px !important;
            }

            .editor-toolbar button:hover, .editor-toolbar button.active {
                background: rgba(79, 172, 254, 0.2) !important;
                color: #4facfe !important;
                border: none !important;
            }

            .editor-preview, .editor-preview-side {
                background: #0d1117 !important;
                color: white !important;
            }

            .editor-toolbar button {
                margin: 2px !important;
                width: 32px !important;
                height: 32px !important;
            }

            .CodeMirror {
                background: rgba(0, 0, 0, 0.2) !important;
                color: white !important;
                border: 1px solid rgba(255, 255, 255, 0.2) !important;
                border-bottom: none !important;
                border-bottom-left-radius: 8px;
                border-bottom-right-radius: 8px;
                min-height: 300px !important;
            }

            .CodeMirror-selected {
                background: rgba(79, 172, 254, 0.3) !important;
            }
        </style>
    </div>
</div>
</body>
</html>
