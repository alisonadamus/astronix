<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="uk">
<html th:replace="~{layout :: layout(~{::title}, ~{::#main-content})}">
<head>
    <title>Матеріали - Astronix</title>
</head>
<body>
<div id="main-content" style="width: 100%; padding: 0;">
    <nav class="navbar" th:replace="~{locations :: .navbar}"></nav>

    <div class="admin-layout">
        <aside class="sidebar" th:replace="~{admin/locations :: aside}"></aside>

        <main class="admin-content">
            <h2 th:text="${material.id == null ? 'Реєстрація нової матерії' : 'Коригування даних'}"></h2>

            <div class="auth-container" style="max-width: 900px; margin: 0; text-align: left;">
                <form th:action="@{/admin/materials/save}" th:object="${material}" method="post">
                    <input type="hidden" th:field="*{id}">

                    <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 20px; margin-bottom: 20px;">
                        <div>
                            <label>Назва об'єкту</label>
                            <input type="text" th:field="*{name}" required placeholder="Напр: Темна матерія">
                        </div>
                        <div>
                            <label>Час вивчення (хв)</label>
                            <input type="number" th:field="*{estimatedTime}" placeholder="0">
                        </div>
                    </div>

                    <div style="margin-bottom: 20px;">
                        <label>Локація знаходження</label>
                        <select th:field="*{location}">
                            <option th:value="null">-- Оберіть систему --</option>
                            <option th:each="loc : ${locations}" th:value="${loc.id}" th:text="${loc.name}"></option>
                        </select>
                    </div>

                    <div style="margin-bottom: 25px;">
                        <label style="display: block; margin-bottom: 10px; color: #4facfe; font-weight: 600;">
                            Категорії матеріалу
                        </label>
                        <div class="checkbox-group">
                            <label th:each="cat : ${categories}" class="checkbox-item">
                                <input type="checkbox"
                                       th:field="*{categories}"
                                       th:value="${cat.id}">
                                <span th:text="${cat.name}"></span>
                            </label>
                        </div>
                        <small style="color: #718096; margin-top: 8px; display: block;">
                            Оберіть одну або декілька категорій, до яких належить цей ресурс.
                        </small>
                    </div>

                    <div style="margin-bottom: 20px;">
                        <label style="color: #4facfe; font-weight: 600;">контент (Markdown)</label>
                        <textarea th:field="*{content}" id="markdown-editor"></textarea>
                    </div>

                    <div style="display: flex; gap: 15px;">
                        <button type="submit">Зберегти зміни</button>
                        <a th:href="@{/admin/materials}" style="line-height: 50px; color: #a0aec0; text-decoration: none;">Скасувати</a>
                    </div>
                </form>
            </div>
        </main>

    </div>
</div>
</body>
</html>
