<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="uk">
<html th:replace="~{layout :: layout(~{::title}, ~{::#main-content})}">
<head>
    <title th:text="${location.name} + ' - Astronix'"></title>
</head>
<body>
<div id="main-content" style="width: 100%; padding: 0;">
    <nav class="navbar" th:replace="~{locations :: .navbar}"></nav>

    <div style="max-width: 1100px; margin: 0 auto; padding: 30px 20px;">

        <div style="margin-bottom: 20px;">
            <a th:href="@{/locations}"
               style="color: #a0aec0; text-decoration: none; display: inline-flex; align-items: center; gap: 8px; font-weight: 500;">
                <span>←</span> Повернутися до карти
            </a>
        </div>

        <div style="display: flex; gap: 40px; background: rgba(255, 255, 255, 0.03); padding: 40px; border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.1); margin-bottom: 50px; align-items: center; flex-wrap: wrap;">

            <div style="flex: 0 0 240px; height: 240px; border-radius: 15px; overflow: hidden; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center;">
                <img th:if="${location.imageUrl != null and !location.imageUrl.isEmpty()}"
                     th:src="${location.imageUrl}"
                     style="width: 100%; height: 100%; object-fit: cover;"
                     alt="Локація">
                <span th:unless="${location.imageUrl != null and !location.imageUrl.isEmpty()}" style="color: #4a5568;">Немає фото</span>
            </div>

            <div style="flex: 1; min-width: 300px;">
                <h1 th:text="${location.name}" style="margin: 0 0 15px 0; color: white; font-size: 2.8rem;">Назва</h1>

                <!-- Вирівнювання по ширині -->
                <p th:text="${location.description}"
                   style="color: #cbd5e0; line-height: 1.7; margin-bottom: 25px; font-size: 1.1rem; text-align: justify;"></p>

                <a th:href="@{/map(locationId=${location.id})}"
                   style="display: inline-flex; align-items: center; gap: 10px; background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); color: #000; padding: 12px 30px; border-radius: 30px; font-weight: bold; text-decoration: none;">
                    Відкрити 3D-карту
                </a>
            </div>
        </div>

        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 40px;">
            <div>
                <h2 style="color: #4facfe; border-bottom: 2px solid rgba(79, 172, 254, 0.2); padding-bottom: 12px; margin-bottom: 25px;">База знань</h2>

                <div style="display: flex; flex-direction: column; gap: 15px;">
                    <a th:each="m : ${materials}" th:href="@{/materials/{id}(id=${m.id})}"
                       style="display: block; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.08); padding: 20px; border-radius: 12px; text-decoration: none; transition: 0.3s;">

                        <strong th:text="${m.name}" style="font-size: 1.15rem; display: block; margin-bottom: 12px; color: white;">Назва</strong>

                        <div style="display: flex; flex-wrap: wrap; gap: 10px;">
                            <div th:each="cat : ${m.categories}"
                                 style="display: flex; align-items: center; gap: 8px; background: rgba(79, 172, 254, 0.1); border: 1px solid rgba(79, 172, 254, 0.2); padding: 4px 10px; border-radius: 8px;">

                                <div style="width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; flex-shrink: 0;">
                                    <img th:if="${cat.icon.startsWith('http') or cat.icon.startsWith('/')}"
                                         th:src="${cat.icon}"
                                         style="width: 100%; height: 100%; object-fit: contain;">
                                    <span th:unless="${cat.icon.startsWith('http') or cat.icon.startsWith('/')}"
                                          th:text="${cat.icon}"
                                          style="font-size: 1rem; line-height: 1;"></span>
                                </div>

                                <span th:text="${cat.name}" style="color: #4facfe; font-size: 0.85rem; font-weight: 500;">Назва категорії</span>
                            </div>
                        </div>
                    </a>
                </div>
            </div>

            <div>
                <h2 style="color: #4facfe; border-bottom: 2px solid rgba(79, 172, 254, 0.2); padding-bottom: 12px; margin-bottom: 25px;">Випробування</h2>
                <div style="display: flex; flex-direction: column; gap: 15px;">
                    <a th:each="t : ${tasks}" th:href="@{/tasks/{id}(id=${t.id})}"
                       style="display: flex; align-items: center; gap: 20px; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.08); padding: 15px 20px; border-radius: 12px; text-decoration: none; color: white;">
                        <div style="background: rgba(79, 172, 254, 0.15); color: #4facfe; width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-weight: bold; border: 1px solid rgba(79, 172, 254, 0.3);"
                             th:text="${t.orderIndex}">1</div>
                        <div>
                            <div style="font-weight: 600;" th:text="'Місія ' + ${t.orderIndex}"></div>
                            <div style="color: #a0aec0; font-size: 0.85rem;" th:text="${t.type}"></div>
                        </div>
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
