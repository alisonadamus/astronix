<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="uk">
<html th:replace="~{layout :: layout(~{::title}, ~{::#main-content})}">
<head>
    <title th:text="${location.name} + ' - Astronix'"></title>
</head>
<body>
<div id="main-content" style="width: 100%; padding: 0;">
    <nav class="navbar" th:replace="~{locations :: .navbar}"></nav>

    <div style="max-width: 1100px; margin: 0 auto; padding: 30px 20px;">

        <div style="margin-bottom: 20px;">
            <a th:href="@{/locations}"
               style="color: #a0aec0; text-decoration: none; display: inline-flex; align-items: center; gap: 8px; font-weight: 500;">
                <span>←</span> Повернутися до карти
            </a>
        </div>

        <div style="display: flex; gap: 40px; background: rgba(255, 255, 255, 0.03); padding: 40px; border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.1); margin-bottom: 50px; align-items: center; flex-wrap: wrap;">

            <div style="flex: 0 0 240px; height: 240px; border-radius: 15px; overflow: hidden; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center;">
                <img th:if="${location.imageUrl != null and !location.imageUrl.isEmpty()}"
                     th:src="${location.imageUrl}"
                     style="width: 100%; height: 100%; object-fit: cover;"
                     alt="Локація">
                <span th:unless="${location.imageUrl != null and !location.imageUrl.isEmpty()}" style="color: #4a5568;">Немає фото</span>
            </div>

            <div style="flex: 1; min-width: 300px;">
                <h1 th:text="${location.name}" style="margin: 0 0 15px 0; color: white; font-size: 2.8rem;">Назва</h1>

                <p th:text="${location.description}"
                   style="color: #cbd5e0; line-height: 1.7; margin-bottom: 25px; font-size: 1.1rem; text-align: justify;"></p>
            </div>
        </div>

        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(450px, 1fr)); gap: 40px;">

            <!-- СЕКЦІЯ МАТЕРІАЛІВ -->
            <div>
                <h2 style="color: #4facfe; border-bottom: 2px solid rgba(79, 172, 254, 0.2); padding-bottom: 12px; margin-bottom: 20px;">База знань</h2>

                <!-- Фільтри матеріалів -->
                <form th:action="@{/locations/{id}(id=${location.id})}" method="get" style="display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap;">
                    <input type="text" name="materialSearch" th:value="${materialSearch}" placeholder="Пошук матеріалу..."
                           style="flex: 1; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 8px 15px; border-radius: 8px;">

                    <select name="categoryId" style="flex: 1; background: #1a202c; color: white; border: 1px solid rgba(255,255,255,0.1); padding: 8px; border-radius: 8px;">
                        <option value="">Всі категорії</option>
                        <option th:each="cat : ${allCategories}" th:value="${cat.id}" th:text="${cat.name}"
                                th:selected="${cat.id == selectedCategoryId}"></option>
                    </select>

                    <button type="submit" style="background: #4facfe; border: none; padding: 8px 15px; border-radius: 8px; cursor: pointer; font-weight: bold;">Пошук</button>
                </form>

                <div style="display: flex; flex-direction: column; gap: 15px;">
                    <a th:each="m : ${materials}" th:href="@{/materials/{id}(id=${m.id})}"
                       style="display: block; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.08); padding: 20px; border-radius: 12px; text-decoration: none; transition: 0.3s;">

                        <strong th:text="${m.name}" style="font-size: 1.15rem; display: block; margin-bottom: 12px; color: white;">Назва</strong>

                        <div style="display: flex; flex-wrap: wrap; gap: 10px;">
                            <div th:each="cat : ${m.categories}"
                                 style="display: flex; align-items: center; gap: 8px; background: rgba(79, 172, 254, 0.1); border: 1px solid rgba(79, 172, 254, 0.2); padding: 4px 10px; border-radius: 8px;">

                                <div style="width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; flex-shrink: 0;">
                                    <img th:if="${cat.icon.startsWith('http') or cat.icon.startsWith('/')}"
                                         th:src="${cat.icon}"
                                         style="width: 100%; height: 100%; object-fit: contain;">
                                    <span th:unless="${cat.icon.startsWith('http') or cat.icon.startsWith('/')}"
                                          th:text="${cat.icon}"
                                          style="font-size: 1rem; line-height: 1;"></span>
                                </div>

                                <span th:text="${cat.name}" style="color: #4facfe; font-size: 0.85rem; font-weight: 500;">Назва категорії</span>
                            </div>
                        </div>
                    </a>
                </div>
            </div>

            <!-- СЕКЦІЯ ЗАВДАНЬ -->
            <div>
                <h2 style="color: #4facfe; border-bottom: 2px solid rgba(79, 172, 254, 0.2); padding-bottom: 12px; margin-bottom: 20px;">Випробування</h2>
                <div th:if="${param.locked}"
                     style="display: flex; align-items: center; gap: 15px; background: rgba(245, 101, 101, 0.15); border: 1px solid #f56565; color: #f56565; padding: 15px 20px; border-radius: 10px; margin-bottom: 20px; font-weight: 500; animation: shake 0.4s ease-in-out;">
                    <div>
                        <div style="font-weight: bold; font-size: 0.95rem;">Місія заблокована!</div>
                        <div style="font-size: 0.85rem; color: #feb2b2; margin-top: 2px;">Ви не можете перестрибнути рівень. Спершу завершіть попереднє завдання.</div>
                    </div>
                </div>
                <!-- Фільтри завдань -->
                <form th:action="@{/locations/{id}(id=${location.id})}" method="get" style="display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap;">
                    <select name="taskType" style="flex: 1; background: #1a202c; color: white; border: 1px solid rgba(255,255,255,0.1); padding: 8px; border-radius: 8px;">
                        <option value="">Всі типи</option>
                        <option th:each="type : ${taskTypes}" th:value="${type}" th:text="${type.name}"
                                th:selected="${type == selectedTaskType}"></option>
                    </select>

                    <select name="difficulty" style="flex: 1; background: #1a202c; color: white; border: 1px solid rgba(255,255,255,0.1); padding: 8px; border-radius: 8px;">
                        <option value="">Будь-яка складність</option>
                        <option th:each="diff : ${difficulties}" th:value="${diff}" th:text="${diff.name}"
                                th:selected="${diff == selectedDifficulty}"></option>
                    </select>

                    <button type="submit" style="background: #4facfe; border: none; padding: 8px 15px; border-radius: 8px; cursor: pointer; font-weight: bold;">Пошук</button>
                </form>

                <div style="display: flex; flex-direction: column; gap: 15px;">
                    <th:block th:each="t : ${tasks}" th:with="isLocked=${tasksLockStatus.get(t.id)}">

                        <div th:if="${isLocked}"
                             style="display: flex; align-items: center; gap: 20px; background: rgba(255,255,255,0.02); border: 1px dashed rgba(255,255,255,0.05); padding: 15px 20px; border-radius: 12px; color: #4a5568;">

                            <div style="background: rgba(255, 255, 255, 0.02); color: #4a5568; width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-weight: bold; border: 1px solid rgba(255, 255, 255, 0.05);">
                                🔒
                            </div>

                            <div style="flex: 1;">
                                <div style="font-weight: 600; color: #5a6578;" th:text="'Місія ' + ${t.orderIndex} + ' (Заблоковано)'"></div>

                                <div style="display: flex; gap: 10px; align-items: center; margin-top: 4px; opacity: 0.4;">
                                    <span th:text="${t.difficulty.name}"
                                          style="font-size: 0.7rem; padding: 2px 6px; border-radius: 4px; border: 1px solid #4a5568; color: #4a5568;">
                    </span>
                                    <span style="color: #4a5568; font-size: 0.8rem;">•</span>
                                    <span style="color: #4a5568; font-size: 0.85rem;" th:text="${t.type.name}"></span>
                                </div>
                            </div>
                        </div>

                        <a th:if="${!isLocked}" th:href="@{/tasks/{id}(id=${t.id})}"
                           style="display: flex; align-items: center; gap: 20px; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.08); padding: 15px 20px; border-radius: 12px; text-decoration: none; color: white; transition: all 0.2s ease;"
                           onmouseover="this.style.background='rgba(79, 172, 254, 0.08)'; this.style.borderColor='rgba(79, 172, 254, 0.3)';"
                           onmouseout="this.style.background='rgba(0,0,0,0.4)'; this.style.borderColor='rgba(255,255,255,0.08)';">

                            <div style="background: rgba(79, 172, 254, 0.15); color: #4facfe; width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-weight: bold; border: 1px solid rgba(79, 172, 254, 0.3);"
                                 th:text="${t.orderIndex}">1</div>

                            <div style="flex: 1;">
                                <div style="font-weight: 600;" th:text="'Місія ' + ${t.orderIndex}"></div>
                                <div style="display: flex; gap: 10px; align-items: center; margin-top: 4px;">
                                    <span th:text="${t.difficulty.name}"
                                          th:style="'font-size: 0.7rem; padding: 2px 6px; border-radius: 4px; border: 1px solid; ' +
                          (${t.difficulty.name() == 'EASY'} ? 'color: #48bb78; border-color: #48bb78;' :
                           (${t.difficulty.name() == 'MEDIUM'} ? 'color: #ecc94b; border-color: #ecc94b;' : 'color: #f56565; border-color: #f56565;'))">
                    </span>
                                    <span style="color: #718096; font-size: 0.8rem;">•</span>
                                    <span style="color: #a0aec0; font-size: 0.85rem;" th:text="${t.type.name}"></span>
                                </div>
                            </div>

                            <div style="color: #4facfe; font-weight: bold;">→</div>
                        </a>

                    </th:block>

                    <p th:if="${#lists.isEmpty(tasks)}" style="color: #718096; text-align: center;">Завдань не знайдено</p>
                </div>
            </div>
        </div>



    </div>
</div>
</body>
</html>
